<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>ZuriBills - Invoicing Software for Small Business | Get Paid Faster</title>
    <meta name="title" content="ZuriBills - Invoicing Software for Small Business | Get Paid Faster" />
    <meta name="description" content="Create professional invoices in seconds, accept instant payments, and automate follow-ups with AI. Trusted by 5,000+ freelancers, artisans, and small businesses in Africa and beyond." />
    <meta name="keywords" content="invoicing software, online invoice generator, small business billing, payment platform, invoice app, freelancer invoicing, artisan business tools, Africa fintech, e-invoicing Nigeria, instant payouts" />
    <meta name="author" content="ZuriBills" />
    <meta name="robots" content="index, follow" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#0EA5A4" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zuribills.com/" />
    <meta property="og:title" content="ZuriBills - Get Paid Faster with Smart Invoicing" />
    <meta property="og:description" content="Create invoices in seconds, accept instant payments, and let AI chase overdue invoices for you. Start free — no credit card required." />
    <meta property="og:image" content="https://zuribills.com/og-image.png" />
    <meta property="og:site_name" content="ZuriBills" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://zuribills.com/" />
    <meta property="twitter:title" content="ZuriBills - Get Paid Faster with Smart Invoicing" />
    <meta property="twitter:description" content="Create invoices in seconds, accept instant payments, and let AI chase overdue invoices for you. Start free — no credit card required." />
    <meta property="twitter:image" content="https://zuribills.com/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://zuribills.com/" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ZuriBills",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "The smartest way to invoice clients and get paid instantly. AI-powered invoicing software trusted by freelancers, artisans, and small businesses across Africa and beyond.",
        "offers": {
            "@type": "Offer",
            "price": "2.00",
            "priceCurrency": "USD",
            "priceValidUntil": "2026-12-31"
        },
        "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.8",
            "ratingCount": "150"
        },
        "featureList": [
            "Create professional invoices in under 60 seconds",
            "Accept cards, bank transfers, and mobile money",
            "AI assistant that chases overdue payments automatically",
            "One-click tax-ready financial reports",
            "Multi-currency support (USD, NGN, GHS, KES, GBP, EUR)",
            "NITDA e-invoicing compliant for Nigerian businesses"
        ]
    }
    </script>

    <!-- Structured Data - FAQ -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
            {
                "@type": "Question",
                "name": "How do I get paid with ZuriBills?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Your clients can pay via card, bank transfer, or mobile money. Funds are routed directly to your bank account or mobile wallet instantly."
                }
            },
            {
                "@type": "Question",
                "name": "Is there a transaction fee?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "We charge a small platform fee only when you receive payment. There are no monthly fees for basic features."
                }
            },
            {
                "@type": "Question",
                "name": "Can I use ZuriBills for e-invoicing compliance?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Yes, ZuriBills supports NITDA e-invoicing guidelines with configurable TIN fields, QR codes, and VAT reporting for Nigerian businesses."
                }
            }
        ]
    }
    </script>

    <!-- Tailwind CDN for initial render -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'var(--background)',
                        surface: 'var(--surface)',
                        foreground: 'var(--text)',
                        primary: 'var(--primary)',
                        secondary: 'var(--secondary)',
                        muted: 'var(--text-muted)',
                        border: 'var(--border)',
                        slate: {
                            800: 'var(--surface)',
                            900: 'var(--background)',
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'var(--font-body)', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'var(--font-display)', 'sans-serif'],
                        body: ['Plus Jakarta Sans', 'var(--font-body)', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 16px 40px rgba(0, 0, 0, 0.12)',
                        'lift': '0 24px 60px rgba(0, 0, 0, 0.18)',
                        'glass': '0 8px 32px rgba(0, 0, 0, 0.1)',
                    },
                    backdropBlur: {
                        'glass': '16px',
                    }
                }
            }
        }
    </script>

    <!-- Fonts: Plus Jakarta Sans (recommended for SaaS) + fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Preload critical assets -->
    <link rel="preload" href="/src/main.tsx" as="script" crossorigin>
</head>

<body>
    <div id="root"></div>

    <!-- Preloader -->
    <div id="preloader" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--background, #ffffff); z-index: 99999; transition: opacity 0.3s ease-out;">
        <div style="text-align: center;">
            <svg width="60" height="60" viewBox="0 0 200 200" style="animation: pulse 1.5s ease-in-out infinite;">
                <circle cx="100" cy="100" r="90" fill="none" stroke="#0EA5A4" stroke-width="12" opacity="0.2"/>
                <circle cx="100" cy="100" r="90" fill="none" stroke="#0EA5A4" stroke-width="12" stroke-dasharray="400" stroke-dashoffset="300" stroke-linecap="round" style="animation: spin 1.2s linear infinite; transform-origin: center;"/>
                <circle cx="100" cy="38" r="14" fill="#0EA5A4"/>
                <circle cx="153.5" cy="131" r="14" fill="#0EA5A4"/>
                <circle cx="46.5" cy="131" r="14" fill="#0EA5A4"/>
                <circle cx="100" cy="100" r="22" fill="none" stroke="#0EA5A4" stroke-width="12"/>
            </svg>
            <p style="margin-top: 16px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; color: #64748b; font-weight: 500;">Loading...</p>
        </div>
        <style>
            @keyframes spin {
                from { stroke-dashoffset: 400; }
                to { stroke-dashoffset: 0; }
            }
            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.7; }
            }
            @media (prefers-color-scheme: dark) {
                #preloader { background: #0a0a0a; }
                #preloader p { color: #94a3b8; }
            }
            .dark #preloader { background: #0a0a0a; }
            .dark #preloader p { color: #94a3b8; }
        </style>
    </div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Reduced motion preference -->
    <script>
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            document.documentElement.classList.add('reduce-motion');
        }
    </script>
</body>

</html>
